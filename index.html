<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="A from-scratch WebGPU renderer for Freedoom — own WAD parser, real 3D geometry, raw WGSL." />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <title>WEBGPU·DOOM</title>
    <style>
      :root {
        color-scheme: dark;
        --fg: #7dff8a;       /* fog green */
        --fg-dim: #4a9d54;
        --bg: #000;
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; background: var(--bg); overflow: hidden; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }

      /* Shared CRT visual world for all overlays */
      .screen {
        position: fixed; inset: 0; z-index: 10;
        display: grid; place-items: center;
        background:
          radial-gradient(ellipse 120% 100% at 50% 50%, transparent 38%, rgba(0,0,0,.82) 100%),
          #050705;
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        color: var(--fg);
        text-align: center;
        -webkit-user-select: none; user-select: none;
      }
      .screen::after { /* scanlines */
        content: ""; position: absolute; inset: 0; pointer-events: none;
        background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,.25) 3px, rgba(0,0,0,0) 4px);
        mix-blend-mode: multiply; opacity: .5;
      }
      .screen[hidden] { display: none; }

      .title {
        font-size: clamp(34px, 8vw, 86px); font-weight: 800; letter-spacing: .12em;
        margin: 0 0 .2em; color: var(--fg);
        text-shadow: 0 0 18px rgba(125,255,138,.55), 0 0 4px rgba(125,255,138,.9);
      }
      .subtitle { font-size: clamp(11px, 1.6vw, 15px); color: var(--fg-dim); letter-spacing: .18em; margin: 0 0 2.4em; }
      .cta {
        font-size: clamp(15px, 2.4vw, 22px); letter-spacing: .22em; font-weight: 700;
        padding: .7em 1.6em; border: 1.5px solid var(--fg-dim); border-radius: 3px;
        cursor: pointer; background: rgba(125,255,138,.04);
        animation: pulse 1.5s ease-in-out infinite;
      }
      .cta:hover { background: rgba(125,255,138,.12); border-color: var(--fg); }
      @keyframes pulse { 50% { opacity: .42; } }

      .legend { margin-top: 3em; font-size: clamp(10px, 1.4vw, 13px); color: var(--fg-dim); line-height: 2; letter-spacing: .08em; }
      .legend b { color: var(--fg); font-weight: 700; }

      /* Loading */
      .load-label { font-size: 14px; letter-spacing: .2em; color: var(--fg-dim); margin-bottom: 1.1em; }
      .bar { width: min(360px, 64vw); height: 8px; border: 1px solid var(--fg-dim); border-radius: 99px; overflow: hidden; background: rgba(125,255,138,.05); }
      .bar > i { display: block; height: 100%; width: 0%; background: var(--fg); box-shadow: 0 0 10px rgba(125,255,138,.7); transition: width .15s linear; }

      /* Error / unsupported */
      #err { z-index: 30; background: #1a0606; color: #ff8a8a; }
      #err .title { color: #ff8a8a; text-shadow: 0 0 14px rgba(255,120,120,.5); font-size: clamp(22px, 4vw, 40px); }
      #err .msg { max-width: 40ch; font-size: 14px; line-height: 1.6; color: #e7b0b0; white-space: pre-wrap; }

      /* Weapon overlay (Canvas2D) */
      #weapon { position: fixed; inset: 0; z-index: 4; pointer-events: none; image-rendering: pixelated; }
      #weapon[hidden] { display: none; }

      /* Crosshair */
      #crosshair { position: fixed; inset: 0; z-index: 5; display: grid; place-items: center; pointer-events: none; }
      #crosshair[hidden] { display: none; }

      /* Debug HUD (kept; Phase 4 will demote it) */
      #hud {
        position: fixed; left: 10px; top: 10px; z-index: 6;
        font: 12px/1.45 ui-monospace, Menlo, monospace;
        color: var(--fg); text-shadow: 0 0 4px #000; white-space: pre; pointer-events: none; opacity: .85;
      }

      @media (prefers-reduced-motion: reduce) {
        .cta { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="app"><canvas id="gfx"></canvas></div>

    <canvas id="weapon" hidden></canvas>

    <div id="crosshair" hidden>
      <svg width="26" height="26" viewBox="0 0 26 26" aria-hidden="true">
        <g stroke="#7dff8a" stroke-width="1.6" stroke-linecap="round" opacity="0.85"
           filter="drop-shadow(0 0 1px #000)">
          <line x1="13" y1="4"  x2="13" y2="9" />
          <line x1="13" y1="17" x2="13" y2="22" />
          <line x1="4"  y1="13" x2="9"  y2="13" />
          <line x1="17" y1="13" x2="22" y2="13" />
        </g>
      </svg>
    </div>

    <div id="hud"></div>

    <div id="loading" class="screen">
      <div>
        <div class="load-label" id="load-label">LOADING WAD…</div>
        <div class="bar"><i id="load-fill"></i></div>
      </div>
    </div>

    <div id="title" class="screen" hidden>
      <div>
        <h1 class="title">WEBGPU·DOOM</h1>
        <p class="subtitle">A FROM-SCRATCH WEBGPU ENGINE · RUNNING FREEDOOM</p>
        <div class="cta" id="cta" role="button" tabindex="0">CLICK TO ENTER</div>
        <div class="legend">
          <b>WASD</b> move &nbsp;·&nbsp; <b>MOUSE</b> look &nbsp;·&nbsp; <b>SPACE</b> use / open<br />
          <b>F</b> fly &nbsp;·&nbsp; <b>M</b> automap &nbsp;·&nbsp; <b>ESC</b> pause
        </div>
      </div>
    </div>

    <div id="err" class="screen" hidden>
      <div>
        <h1 class="title">⚠ CAN’T RUN</h1>
        <p class="msg" id="err-msg"></p>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
