<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>webgpu-doom</title>
    <style>
      :root { color-scheme: dark; }
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      #app { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }
      #hud {
        position: fixed; left: 10px; top: 10px;
        font: 12px/1.4 ui-monospace, Menlo, monospace;
        color: #6f6; text-shadow: 0 0 4px #000; white-space: pre; pointer-events: none;
      }
      #err {
        position: fixed; inset: 0; display: none; place-items: center;
        font: 14px/1.5 ui-monospace, monospace; color: #f66; padding: 2rem;
        text-align: center; background: #200;
      }
    </style>
  </head>
  <body>
    <div id="app"><canvas id="gfx"></canvas></div>
    <div id="hud"></div>
    <div id="err"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
